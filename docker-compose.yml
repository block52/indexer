services:
  postgres:
    image: postgres:16-alpine
    container_name: poker-indexer-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-poker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-poker_indexer_dev}
      POSTGRES_DB: ${POSTGRES_DB:-poker_hands}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./sql/analysis.sql:/docker-entrypoint-initdb.d/02-analysis.sql:ro
      - ./sql/player_stats.sql:/docker-entrypoint-initdb.d/03-player_stats.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poker -d poker_hands"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - indexer-network

  indexer:
    build:
      context: .
      dockerfile: Dockerfile.indexer
    container_name: poker-indexer
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - -continuous
      - -node
      - ${NODE_RPC:-http://node1.block52.xyz:26657}
      - -db-host
      - ${DB_HOST:-postgres}
      - -db-port
      - "${DB_PORT:-5432}"
      - -db-user
      - ${POSTGRES_USER:-poker}
      - -db-pass
      - ${POSTGRES_PASSWORD:-poker_indexer_dev}
      - -db-name
      - ${POSTGRES_DB:-poker_hands}
      - -start
      - "${START_BLOCK:-1}"
      - -loop-delay
      - "${LOOP_DELAY:-60}"
    restart: unless-stopped
    networks:
      - indexer-network

  # Optional: Adminer for database management UI
  adminer:
    image: adminer:5-standalone
    container_name: poker-adminer
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    networks:
      - indexer-network
    profiles:
      - tools

volumes:
  postgres_data:
    driver: local

networks:
  indexer-network:
    driver: bridge
